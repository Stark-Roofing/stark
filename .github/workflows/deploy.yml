name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install dependencies
      run: npm ci

    # ── Step 1: Fetch Google reviews (non-fatal) ──
    - name: Fetch Google reviews
      continue-on-error: true
      env:
        GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        GOOGLE_PLACE_ID: ${{ secrets.GOOGLE_PLACE_ID }}
      run: node scripts/fetch-google-reviews.mjs

    # ── Step 2: Vite build (must succeed) ──
    - name: Vite build
      run: npm run build

    # ── Step 3: Prerender with Puppeteer ──
    - name: Install Puppeteer system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libatk1.0-0 libatk-bridge2.0-0 libcups2 libxdamage1 libxkbcommon0 libpango-1.0-0 libcairo2 libasound2 libnspr4 libnss3 libgbm1 || true

    - name: Install Puppeteer browser
      run: npx puppeteer browsers install chrome

    - name: Prerender static HTML
      continue-on-error: true
      run: node scripts/prerender.mjs

    # ── Step 4: Fill gaps for any pages prerender missed ──
    - name: Generate fallback HTML for missing blog pages
      run: node scripts/generate-blog-fallbacks.mjs

    - name: Generate fallback HTML for all remaining pages
      run: node scripts/generate-all-fallbacks.mjs

    # ── Step 5: Verify critical pages exist ──
    - name: Verify critical pages exist
      run: |
        MISSING=0
        for page in contact finance services roof-replacement storm-damage about warranty; do
          if [ ! -f "dist/$page/index.html" ]; then
            echo "MISSING: dist/$page/index.html"
            MISSING=$((MISSING + 1))
          else
            echo "OK: dist/$page/index.html"
          fi
        done
        if [ "$MISSING" -gt 0 ]; then
          echo "::error::$MISSING critical pages missing. Deployment blocked."
          exit 1
        fi
        echo "All critical pages verified."

        # Existence is not enough: "Prerender static HTML" above runs with
        # continue-on-error, so a Puppeteer failure on any single route does
        # NOT fail this job — it silently drops that route, and
        # generate-all-fallbacks.mjs then fills the gap with generic
        # boilerplate (real title/meta, but NOT the actual page content).
        # Every dist/<route>/index.html therefore always exists, so a plain
        # file-existence check can never catch this failure mode — this is
        # exactly how the roof-replacement/skylights/tpo-roofing/roof-cleaning
        # pages shipped generic content undetected.
        #
        # For each page below, fail if ANY of:
        #  - <div id="root"></div> is empty (Puppeteer never rendered into it —
        #    the same signal generate-all-fallbacks.mjs itself uses to decide
        #    whether a file needs replacing)
        #  - the page contains that OTHER pages' fallback template sentence,
        #    i.e. "<Service> for Seattle, Bellevue & the Eastside" — the exact,
        #    verified string generate-all-fallbacks.mjs's own
        #    makeServicePageMeta()/URL_METADATA produce for this route when
        #    Puppeteer fails on it
        #  - the page is missing its own distinctive title keyword (sanity
        #    check that real content, if present, is actually about this page)
        #  - the page contains generic boilerplate copy reported live in
        #    production ("Licensed & Insured Experts in Residential &
        #    Commercial Roofing") — not currently reproducible from this
        #    repo's templates, kept as a defense-in-depth string match
        #
        # python3 (not grep -P) so this behaves identically on macOS dev
        # machines and this Ubuntu runner.
        echo ""
        echo "Checking for generic-fallback content on known-flaky routes..."
        GENERIC=0
        for page in roof-replacement skylights tpo-roofing roof-cleaning; do
          file="dist/$page/index.html"
          case "$page" in
            roof-replacement) POSITIVE="Roof Replacement"; FALLBACK_H1="Roof Replacement for Seattle, Bellevue & the Eastside" ;;
            skylights)        POSITIVE="Skylight";         FALLBACK_H1="Skylight Installation for Seattle, Bellevue & the Eastside" ;;
            tpo-roofing)      POSITIVE="TPO";               FALLBACK_H1="TPO Commercial Roofing for Seattle, Bellevue & the Eastside" ;;
            roof-cleaning)    POSITIVE="Roof Cleaning";     FALLBACK_H1="Roof Cleaning for Seattle, Bellevue & the Eastside" ;;
          esac
          REASON=$(POSITIVE="$POSITIVE" FALLBACK_H1="$FALLBACK_H1" python3 -c "
        import os, re, sys
        content = open('$file', encoding='utf-8').read()
        positive = os.environ['POSITIVE']
        fallback_h1 = os.environ['FALLBACK_H1']
        generic_phrase = 'Licensed & Insured Experts in Residential & Commercial Roofing'
        if re.search(r'<div id=\"root\">\s*</div>', content):
            print('empty #root — Puppeteer never rendered into it')
        elif fallback_h1 in content:
            print(f'contains the fallback template h1 \"{fallback_h1}\"')
        elif generic_phrase in content:
            print(f'contains generic boilerplate copy \"{generic_phrase}\"')
        elif positive not in content:
            print(f'missing expected page-specific keyword \"{positive}\"')
          ")
          if [ -n "$REASON" ]; then
            echo "::warning::dist/$page/index.html is GENERIC FALLBACK content ($REASON). Puppeteer prerender failed for this route — check the 'Prerender static HTML' step log above for the real ✗ error and stack trace."
            GENERIC=$((GENERIC + 1))
          else
            echo "OK (real, page-specific content): dist/$page/index.html"
          fi
        done
        if [ "$GENERIC" -gt 0 ]; then
          echo "::error::$GENERIC page(s) shipped generic fallback content instead of real prerendered HTML. Deployment blocked — fix the prerender failure logged above before merging."
          exit 1
        fi
        echo "All 4 tracked pages verified as real, page-specific prerendered content."

    # ── Deploy ──
    - name: Create 404.html fallback for unknown URLs
      run: cp dist/index.html dist/404.html

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './dist'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

    # ── Notify IndexNow (Bing + AI search engines) of the current URL set ──
    # Non-fatal: a failed ping must never affect the deploy. Ownership is proven
    # by public/d0f2a7c14b9e4a3f8c6b5d0e1a2f3b4c.txt shipped at the site root.
    - name: Ping IndexNow
      continue-on-error: true
      run: |
        node --input-type=module <<'EOF'
        import { readFileSync } from 'node:fs';
        const KEY = 'd0f2a7c14b9e4a3f8c6b5d0e1a2f3b4c';
        const HOST = 'starkroofingrenovation.com';
        const xml = readFileSync('public/sitemap.xml', 'utf8');
        const urls = [...xml.matchAll(/<loc>([^<]+)<\/loc>/g)]
          .map(m => m[1].trim())
          .filter(u => !u.toLowerCase().endsWith('.xml'));
        const body = {
          host: HOST,
          key: KEY,
          keyLocation: `https://${HOST}/${KEY}.txt`,
          urlList: urls.slice(0, 10000),
        };
        const res = await fetch('https://api.indexnow.org/indexnow', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json; charset=utf-8' },
          body: JSON.stringify(body),
        });
        console.log(`IndexNow: HTTP ${res.status} for ${urls.length} URLs`);
        EOF
